<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Grievance Portal - Login</title>
  <link rel="stylesheet" href="style.css">
  <!-- Add Font Awesome for eye icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">
        <img src="mitlogo.png" alt="College Logo">
      </div>
      
      <h1>Student Grievance Portal</h1>
      <p class="subtitle">MIT ART DESIGN AND TECHNOLOGICAL UNIVERSITY PUNE</p>
      
      <h2>Portal Login</h2>
      
      <div id="alertContainer"></div>
      
      <form id="loginForm" onsubmit="login(event)">
        <input 
          type="text" 
          id="email" 
          placeholder="Enrollment Number" 
          required
        >
        
        <div style="position: relative;">
          <input 
            type="password" 
            id="password" 
            placeholder="Password" 
            required
            style="width: 100%; padding-right: 40px;"
          >
          <i 
            class="fa-solid fa-eye" 
            id="togglePassword" 
            style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer;"
          ></i>
        </div>
        
        <button type="submit">Login to Portal</button>
      </form>
    </div>
  </div>

  <script>
    // Password show/hide toggle
    const togglePassword = document.querySelector("#togglePassword");
    const password = document.querySelector("#password");

    togglePassword.addEventListener("click", function () {
      const type = password.getAttribute("type") === "password" ? "text" : "password";
      password.setAttribute("type", type);
      this.classList.toggle("fa-eye-slash");
    });
  </script>

  <script src="public/api.js"></script>
  <script src="public/script.js"></script>
</body>
</html>
